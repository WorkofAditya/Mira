name: Auto Generate Changelog

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          REPO="${{ github.repository }}"
          BRANCH="main"

          echo "" > CHANGELOG.md

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null)

          echo "## Unreleased" >> CHANGELOG.md
          echo "| Date | Commit | Change | Files |" >> CHANGELOG.md
          echo "|------|--------|--------|-------|" >> CHANGELOG.md

          if [ -n "$LAST_TAG" ]; then
            RANGE="$LAST_TAG..HEAD"
          else
            RANGE="HEAD"
          fi

          git log $RANGE --pretty=format:'%H|%h|%ad|%s' --date=short \
          | grep -v "Auto-update CHANGELOG.md" \
          | while IFS="|" read HASH SHORTHASH DATE MESSAGE
          do
            FILES=$(git show --name-only --pretty="" "$HASH" | paste -sd ", " -)

            echo "| $DATE | [$SHORTHASH](https://github.com/$REPO/commit/$HASH) | $MESSAGE | $FILES |" >> CHANGELOG.md
          done

          for TAG in $(git tag --sort=-creatordate)
          do
            echo "" >> CHANGELOG.md
            echo "## $TAG" >> CHANGELOG.md
            echo "| Date | Commit | Change | Files |" >> CHANGELOG.md
            echo "|------|--------|--------|-------|" >> CHANGELOG.md

            PREV_TAG=$(git tag --sort=-creatordate | grep -A1 "^$TAG$" | tail -n1)

            if [ "$TAG" == "$LAST_TAG" ]; then
              RANGE="$TAG"
            else
              RANGE="$PREV_TAG..$TAG"
            fi

            git log $RANGE --pretty=format:'%H|%h|%ad|%s' --date=short \
            | grep -v "Auto-update CHANGELOG.md" \
            | while IFS="|" read HASH SHORTHASH DATE MESSAGE
            do
              FILES=$(git show --name-only --pretty="" "$HASH" | paste -sd ", " -)

              echo "| $DATE | [$SHORTHASH](https://github.com/$REPO/commit/$HASH) | $MESSAGE | $FILES |" >> CHANGELOG.md
            done
          done

      - name: Commit changelog
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add CHANGELOG.md
          git commit -m "Auto-update CHANGELOG.md" || exit 0
          git push
