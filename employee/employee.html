<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="entryPageTitle">Employee Data Entry</title>
  <link rel="stylesheet" href="../Auth/auth.css">
  <link rel="stylesheet" href="employee.css">
</head>
<body>
  <div class="employee-app">
    <header class="employee-topbar">
      <div class="logo">RC</div>
      <div class="title" id="entryModeTitle">Employee Data Entry</div>
      <div class="branch" id="employeeBranchLabel"></div>
    </header>

    <main class="employee-body">
      <section class="form-grid">
        <div class="row">
          <label for="name">Name</label>
          <input type="text" id="name" autocomplete="off">
        </div>
        <div class="row">
          <label for="mobileNumber">Mobile Number</label>
          <input type="text" id="mobileNumber" autocomplete="off">
        </div>
        <div class="row">
          <label for="designation">Designation</label>
          <input type="text" id="designation" autocomplete="off">
        </div>
        <div class="row">
          <label for="joiningDate">Joining Date</label>
          <input type="date" id="joiningDate">
        </div>
        <div class="row">
          <label for="monthlySalary">Monthly Salary</label>
          <input type="number" id="monthlySalary" min="0">
        </div>
        <div class="row">
          <label for="perDaySalary">Per Day Salary</label>
          <input type="number" id="perDaySalary" min="0">
        </div>
        <div class="row full">
          <label for="address">Address</label>
          <textarea id="address" rows="3"></textarea>
        </div>
      </section>

      <aside class="photo-panel">
        <div class="photo-card">
          <h4>Employee Photo</h4>
          <div class="photo-box">
            <img id="employeePhotoPreview" alt="Employee preview">
            <span id="employeePhotoPlaceholder">No image selected</span>
          </div>
          <input type="file" id="employeePhotoInput" accept="image/*">
        </div>

        <div class="photo-card">
          <h4>Aadhaar Card Photo</h4>
          <div class="photo-box">
            <img id="aadhaarPhotoPreview" alt="Aadhaar preview">
            <span id="aadhaarPhotoPlaceholder">No image selected</span>
          </div>
          <input type="file" id="aadhaarPhotoInput" accept="image/*">
        </div>
      </aside>
    </main>

    <footer class="actions">
      <button type="button" id="btnEmpNew">New</button>
      <button type="button" id="btnEmpEdit">Edit</button>
      <button type="button" id="btnEmpSave">Save</button>
      <button type="button" id="btnEmpDelete">Delete</button>
      <button type="button" id="btnEmpFind">Find</button>
    </footer>
  </div>

  <script src="../Auth/auth.js"></script>
  <script src="employee.js"></script>
</body>
</html>
