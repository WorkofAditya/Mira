<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Preview</title>
<link rel="stylesheet" href="preview.css">
</head>
<body>

<div class="page">

<div class="header">
<div class="logo">RC</div>

<div class="title">
<h1>Riya Cargo</h1>
<h2>DISPATCH</h2>
</div>

<div class="info">
<div><strong>Disp. No :</strong> <span id="dispNo"></span></div>
<div><strong>Disp. Date :</strong> <span id="dispDate"></span></div>
<div><strong>Road/Train :</strong> <span id="dispMethod"></span></div>
<div><strong>Route :</strong> <span id="dispRoute"></span></div>
<div><strong>Driver :</strong> <span id="driver"></span> <strong class="mobile-label">Mo.</strong> <span id="driverMobile"></span></div>
<div><strong>Km Reading :</strong> <span id="kmReading"></span></div>
</div>
</div>

<table class="dispatch-table">

<thead>
<tr>
<th>LR No</th>
<th>Consignor</th>
<th>Consignee</th>
<th>Parcel</th>
<th>Kg.</th>
<th>Paid</th>
<th>To Pay</th>
<th></th>
</tr>
</thead>

<tbody id="dispatchBody">

</tbody>

<tfoot>
<tr>
<td id="totalLrCount"></td>
<td class="city" id="fromBranchLabel"></td>
<td class="city" id="toBranchLabel"></td>
<td id="totalParcel"></td>
<td id="totalKg"></td>
<td id="totalPaid"></td>
<td id="totalToPay"></td>
<td></td>
</tr>
<tr>
<td id="grandLrCount"></td>
<td></td>
<td><strong>Grand Total</strong></td>
<td id="grandParcel"></td>
<td id="grandKg"></td>
<td id="grandPaid"></td>
<td id="grandToPay"></td>
<td></td>
</tr>
</tfoot>

</table>

<div class="footer">

<div class="transport">
Transport : RIYA CARGO
</div>

<div class="signatures">

<div>
<div class="sign-line"></div>
Driver Signature
</div>

<div>
<div class="sign-line"></div>
Owner/Authorised Signature
</div>

</div>

<div class="print-time">
Print Time : <span id="printTime"></span>
</div>

</div>

</div>

<script src="preview.js"></script>
</body>
</html>
